name: Cloud Agent - Email & Social Automation

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  email-triage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create vault directories
        run: |
          mkdir -p AI_Employee_Vault/Needs_Action/email
          mkdir -p AI_Employee_Vault/Needs_Action/social
          mkdir -p AI_Employee_Vault/Pending_Approval/email
          mkdir -p AI_Employee_Vault/Pending_Approval/social
          mkdir -p AI_Employee_Vault/In_Progress/cloud
          mkdir -p AI_Employee_Vault/Updates
          mkdir -p AI_Employee_Vault/Logs

      - name: Run cloud agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: |
          python scripts/cloud_agent.py
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add AI_Employee_Vault/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Cloud Agent: Email triage and social drafts $(date -u +"%Y-%m-%d %H:%M UTC")

            Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
            git push
          fi
