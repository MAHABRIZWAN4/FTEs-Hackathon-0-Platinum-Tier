name: Cloud Agent - Email & Social Automation

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  email-triage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Needs_Action directories
        run: |
          mkdir -p Needs_Action/email
          mkdir -p Needs_Action/social
          mkdir -p vault/Logs

      - name: Run email triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: |
          python scripts/watch_gmail.py --cloud-mode
        continue-on-error: true

      - name: Generate social post drafts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/task_planner.py --generate-social-drafts
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add Needs_Action/ vault/Logs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Cloud Agent: Email triage and social drafts $(date -u +"%Y-%m-%d %H:%M UTC")

            Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
            git push
          fi
