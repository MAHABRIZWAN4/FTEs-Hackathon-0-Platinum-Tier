name: Health Monitor - System Status

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create vault directories
        run: |
          mkdir -p vault/Logs

      - name: Check workflow status
        id: check_workflows
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          # Get workflow runs from GitHub API
          CLOUD_AGENT_STATUS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/cloud-agent.yml/runs?per_page=1" \
            | jq -r '.workflow_runs[0].status // "unknown"')

          CEO_BRIEFING_STATUS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/ceo-briefing.yml/runs?per_page=1" \
            | jq -r '.workflow_runs[0].status // "unknown"')

          VAULT_SYNC_STATUS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/vault-sync.yml/runs?per_page=1" \
            | jq -r '.workflow_runs[0].status // "unknown"')

          # Write status report
          cat > vault/Logs/system_health.md << EOF
          # System Health Report

          **Last Updated:** ${TIMESTAMP}

          ## Workflow Status

          | Workflow | Status | Last Check |
          |----------|--------|------------|
          | Cloud Agent | ${CLOUD_AGENT_STATUS} | ${TIMESTAMP} |
          | CEO Briefing | ${CEO_BRIEFING_STATUS} | ${TIMESTAMP} |
          | Vault Sync | ${VAULT_SYNC_STATUS} | ${TIMESTAMP} |
          | Health Monitor | ✅ running | ${TIMESTAMP} |

          ## System Metrics

          - **Uptime:** Continuous monitoring active
          - **Cloud Agent Interval:** Every 15 minutes
          - **Vault Sync Interval:** Every 2 minutes
          - **Health Check Interval:** Every 5 minutes

          ## Recent Activity

          - Health check completed successfully
          - All workflows monitored
          - Status logged to vault

          ---
          *Generated by GitHub Actions Health Monitor*
          EOF

      - name: Commit health status
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add vault/Logs/system_health.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Health Monitor: System status update

            Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
            git push
          fi
