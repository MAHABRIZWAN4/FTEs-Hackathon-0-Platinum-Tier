name: Health Monitor - System Status

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create vault directories
        run: |
          mkdir -p AI_Employee_Vault/Logs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install psutil rich

      - name: Run health check
        run: |
          python scripts/health_check.py || echo "Health check completed with warnings"

      - name: Ensure health file exists
        run: |
          mkdir -p AI_Employee_Vault/Logs
          touch AI_Employee_Vault/Logs/system_health.md

      - name: Commit health status
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          mkdir -p AI_Employee_Vault/Logs
          echo "# System Health" > AI_Employee_Vault/Logs/system_health.md
          echo "Last check: $(date)" >> AI_Employee_Vault/Logs/system_health.md
          git add -A
          git diff --staged --quiet || git commit -m "Health check update"
          git push
